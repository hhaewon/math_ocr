<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>손글씨 수식 인식 및 검증기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Pretendard', sans-serif;
            padding-bottom: 50px;
        }
        .container {
            max-width: 900px;
            margin-top: 50px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .upload-area {
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background-color: #fff;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .upload-area:hover {
            border-color: #0d6efd;
        }
        .preview-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .char-card {
            display: inline-block;
            width: 100px;
            text-align: center;
            margin: 10px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 10px;
            background-color: #fff;
        }
        .char-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background-color: #f0f0f0;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .char-label {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .result-box {
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }
        .result-success {
            background-color: #eafaf1;
            border: 2px solid #27ae60;
            color: #27ae60;
        }
        .result-fail {
            background-color: #f9ebea;
            border: 2px solid #c0392b;
            color: #c0392b;
        }
        .result-error {
            background-color: #fcf3cf;
            border: 2px solid #f39c12;
            color: #f39c12;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        #resultContainer {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="display-5 fw-bold">손글씨 수식 인식 및 검증기</h1>
            <p class="text-muted">수식 이미지를 업로드하면 인공지능이 계산을 검증해줍니다.</p>
        </div>

        <div class="card p-4">
            <div id="uploadArea" class="upload-area">
                <p class="mb-0">클릭하거나 이미지를 드래그하여 업로드하세요</p>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>
            <div id="loading" class="loading">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">수식을 분석하고 있습니다...</p>
            </div>
        </div>

        <div id="resultContainer">
            <div class="card p-4">
                <h4 class="mb-3">원본 이미지</h4>
                <div class="text-center">
                    <img id="originalImg" class="preview-img" src="" alt="원본">
                </div>
            </div>

            <div class="card p-4">
                <h4 class="mb-3">기호별 인식 결과</h4>
                <div id="charList" class="text-center">
                    <!-- 기호들이 여기에 추가됨 -->
                </div>
            </div>

            <div class="card p-4">
                <h4 class="mb-3">최종 결과</h4>
                <div id="verificationResult" class="result-box">
                    <h2 id="finalEq" class="fw-bold mb-3"></h2>
                    <p id="detailResult" class="mb-4"></p>
                    <h1 id="statusText" class="display-4 fw-bold"></h1>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');
        const originalImg = document.getElementById('originalImg');
        const charList = document.getElementById('charList');
        const finalEq = document.getElementById('finalEq');
        const detailResult = document.getElementById('detailResult');
        const statusText = document.getElementById('statusText');
        const verificationResult = document.getElementById('verificationResult');

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleUpload(file);
        };

        uploadArea.ondragover = (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#0d6efd';
        };

        uploadArea.ondragleave = () => {
            uploadArea.style.borderColor = '#dee2e6';
        };

        uploadArea.ondrop = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) handleUpload(file);
        };

        async function handleUpload(file) {
            loading.style.display = 'block';
            resultContainer.style.display = 'none';
            
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.error) {
                    alert('오류: ' + data.error);
                    return;
                }

                displayResults(data);
            } catch (err) {
                console.error(err);
                alert('서버 연결 중 오류가 발생했습니다.');
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayResults(data) {
            resultContainer.style.display = 'block';
            originalImg.src = 'data:image/png;base64,' + data.original_image;

            // 기호 리스트 초기화 및 추가
            charList.innerHTML = '';
            data.characters.forEach(char => {
                const charCard = document.createElement('div');
                charCard.className = 'char-card shadow-sm';
                charCard.innerHTML = `
                    <img src="data:image/png;base64,${char.image}" class="char-img">
                    <div class="char-label">${char.symbol}</div>
                `;
                charList.appendChild(charCard);
            });

            // 수식 결과 표시
            const v = data.verification;
            finalEq.innerText = '인식된 수식: ' + v.equation;
            
            if (v.left) {
                detailResult.innerText = `좌변: ${v.left} = ${v.left_val} | 우변: ${v.right} = ${v.right_val}`;
            } else {
                detailResult.innerText = '';
            }

            statusText.innerText = '● ' + v.message + ' ●';
            
            // 상태별 스타일 적용
            verificationResult.className = 'result-box';
            if (v.status === 'success') {
                verificationResult.classList.add('result-success');
            } else if (v.status === 'fail') {
                verificationResult.classList.add('result-fail');
            } else {
                verificationResult.classList.add('result-error');
            }

            // 결과 영역으로 스크롤
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
